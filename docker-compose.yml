services:
  server:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://claude_sync:${POSTGRES_PASSWORD:-claude_sync_dev}@db:5432/claude_sync
      API_KEY_HASH: ${API_KEY_HASH}
      DEFAULT_PROJECT: ${DEFAULT_PROJECT:-default}
      PORT: 3001
    volumes:
      - model_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: claude_sync
      POSTGRES_USER: claude_sync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claude_sync_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude_sync"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  model_cache:
